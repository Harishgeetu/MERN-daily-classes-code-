<!DOCTYPE html>
<html>
<head>
<style>
  table {
    width: 60%;
    border-collapse: collapse;
    font-family: Arial, sans-serif;
    text-align: center;
  }
  th, td {
    border: 1px solid black;
    padding: 8px;
  }
  th {
    background-color: #f2f2f2;
  }
</style>
</head>
<body>

<h2>Weather Station</h2>

<table>
  <tr>
    <th rowspan="2">Station</th>
    <th colspan="2">Temperature</th>
    <th rowspan="2">Humidity</th>
    <th rowspan="2">Weather</th>
  </tr>
  <tr>
    <th>Max</th>
    <th>Min</th>
  </tr>
  <tr>
    <td>USA</td>
    <td>24</td>
    <td>19</td>
    <td>60%</td>
    <td>cloudy</td>
  </tr>
  <tr>
    <td>Germany</td>
    <td>5</td>
    <td>-1</td>
    <td>70%</td>
    <td>Rainy</td>
  </tr>
</table>

</body>
</html>
