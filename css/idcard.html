<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student ID Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(#BDDDFC);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        .main-container {
            padding: 20px;
        }
        
        .id-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            padding: 20px;
            width: 350px;
            text-align: center;
        }
        
        .id-card img:first-child {
            width: 100%;
            height: 80px;
            object-fit: contain;
            margin-bottom: 15px;
        }
        
        .sub-container-2 {
            margin: 15px 0;
            font-size: 12px;
            color: #555;
        }
        
        .sub-container-2 p {
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .sub-container-2 span {
            display: bold;
            margin: 5px 0;
        }
        
        #student-image {
            width: 150px;
            height: 120px;
            border-radius: 8px;
            margin: 15px auto;
            display: block;
            border: 3px solid #668eea;
        }
        
        h3 {
            position: absolute;
            left: 525px;
            top:400px;
            color: black;
            font-size: 16px;
            transform: rotate(-90deg);
        }
        
        .sub-container-3 {
            margin-top: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        table tr td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        
        table tr td:first-child {
            font-weight: bold;
            color: #ea667c;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="id-card">
            <img src="https://resources.saylor.org/wwwresources/wp-content/uploads/20200717101134/BITS-VIzag-logo.jpg" alt="college logo">
            <div class="sub-container-2">
                <p>Approved by AICTE, New Delhi & Affiliated to JNTUGV</p>
                <span>"Accredited by NBA"</span>
                <span>An ISO 9001:2015 Certified Institution</span>
                <img id="student-image" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSYO-RnslVwrpn-JSpQJ_MjYOzZrAa5WBIaoA&s" alt="student image">
            </div>
            <h3>College Code: BABA</h3>
            <div class="sub-container-3">
                <table>
                    <tr>
                        <td>Student Name</td>
                        <td>John Doe</td>
                    </tr>
                    <tr>
                        <td>Regd. No.</td>
                        <td>23NR1AO544</td>
                    </tr>
                    <tr>
                        <td>Branch</td>
                        <td>CSE</td>
                    </tr>
                    <tr>
                        <td>Year</td>
                        <td>2nd Year</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
